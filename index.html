<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Multi_Programming | Tech Login</title>
  </head>
  <body>

    <div class="container" id="container">

      <div class="form-container sign-up">
        <div class="form-inner">
          <h1>Create Account</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or use your email for registration</span>
          <div class="input-group">
            <input type="text" id="reg-name" placeholder=" " />
            <label for="reg-name">Name</label>
          </div>
          <div class="input-group">
            <input type="email" id="reg-email" placeholder=" " />
            <label for="reg-email">Email</label>
          </div>
          <div class="input-group">
            <input type="password" id="reg-password" placeholder=" " />
            <label for="reg-password">Password</label>
            <span class="toggle-pw" data-target="reg-password"><i class="fa-regular fa-eye"></i></span>
          </div>
          <div class="strength-bar"><div class="strength-fill"></div></div>
          <span class="strength-text"></span>
          <button type="button" id="signupBtn">
            <span class="btn-text">Sign Up</span>
            <span class="spinner"></span>
          </button>
        </div>
      </div>

      <div class="form-container sign-in">
        <div class="form-inner">
          <h1>Sign In</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or use your email and password</span>
          <div class="input-group">
            <input type="email" id="login-email" placeholder=" " />
            <label for="login-email">Email</label>
          </div>
          <div class="input-group">
            <input type="password" id="login-password" placeholder=" " />
            <label for="login-password">Password</label>
            <span class="toggle-pw" data-target="login-password"><i class="fa-regular fa-eye"></i></span>
          </div>
          <a href="#" class="forgot">Forgot your password?</a>
          <button type="button" id="signinBtn">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
          </button>
        </div>
      </div>

      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Welcome Back!</h1>
            <p>Enter your personal details to use all of the site features</p>
            <button type="button" id="loginBtn">Sign In</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Hello, Friend!</h1>
            <p>Register with your personal details to use all of the site features</p>
            <button type="button" id="registerBtn">Sign Up</button>
          </div>
        </div>
      </div>

    </div>

    <script src="index.js"></script>
  </body>
</html>
